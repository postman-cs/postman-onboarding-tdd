name: 'Postman Onboarding: TDD Preview'
description: Generate a PR-scoped Postman TDD contract collection from a PR OpenAPI spec and run it against the PR implementation.
author: Postman
branding:
  icon: check-circle
  color: orange
inputs:
  mode:
    description: Action mode. Use validate for setup checks, run for PR preview, cleanup for PR close cleanup, or repair for automated implementation repair.
    required: false
    default: run
  onboarding-config-path:
    description: Path to .postman-template/onboarding.yml.
    required: false
    default: .postman-template/onboarding.yml
  project-name:
    description: Optional service project name override. Defaults to service.name from onboarding config.
    required: false
  spec-path:
    description: Optional OpenAPI spec path override. Defaults to spec.path from onboarding config.
    required: false
  pr-number:
    description: Optional PR number override. Defaults to the pull_request event number.
    required: false
  postman-api-key:
    description: Postman API key used for workspace, spec, and collection operations. Required unless mode=validate.
    required: false
  postman-access-token:
    description: Postman access token. Required by mode=repair when the resolved repair provider is postman-agent-mode; optional otherwise.
    required: false
  openai-api-key:
    description: OpenAI API key used by mode=repair when the resolved repair provider is openai-responses.
    required: false
  anthropic-api-key:
    description: Anthropic API key used by mode=repair when the resolved repair provider is anthropic-messages.
    required: false
  github-token:
    description: GitHub token used for PR comments and config writeback. Required unless mode=validate.
    required: false
  repair-github-token:
    description: Optional token used by mode=repair for pushing repair commits. Prefer a PAT or GitHub App token so pushed commits trigger follow-up workflows.
    required: false
  repair-provider:
    description: Optional repair provider guard for mode=repair. When omitted, tdd.repair.provider from onboarding config is used. If set, it must be one of openai-responses, anthropic-messages, or postman-agent-mode and must match onboarding config.
    required: false
  repair-model:
    description: Model used by mode=repair. Defaults to gpt-5.5 for openai-responses, claude-sonnet-5 for anthropic-messages, and GPT_5 for postman-agent-mode.
    required: false
  repair-max-attempts:
    description: Maximum accepted implementation patch attempts in mode=repair.
    required: false
    default: '3'
  repair-commit-message:
    description: Commit message used when mode=repair pushes a passing implementation change.
    required: false
    default: Postman TDD repair
  immutable-state-signing-key:
    description: Optional HMAC signing key for immutable spec baselines. When set, previous sticky comment baselines must have a valid signature.
    required: false
  workspace-team-id:
    description: Numeric Postman sub-team ID for org-mode workspace creation.
    required: false
  config-write-mode:
    description: How workspace ID bootstrap should write back onboarding config. One of commit-and-push, commit-only, none.
    required: false
    default: commit-and-push
  committer-name:
    description: Git committer name for workspace ID writeback commits.
    required: false
    default: Postman
  committer-email:
    description: Git committer email for workspace ID writeback commits.
    required: false
    default: support@postman.com
  postman-region:
    description: Postman data residency region. One of us or eu.
    required: false
    default: us
  postman-stack:
    description: Postman stack profile. Leave prod unless Postman support directs otherwise.
    required: false
    default: prod
outputs:
  status:
    description: passed, failed, skipped, or cleaned-up.
  failure-phase:
    description: 'none, config, workspace, asset_upsert, immutable_state_tampered, immutable_spec, service_startup, health_check, collection_run, test_ratchet, or cleanup. Add the `postman-tdd-allow-ratchet-removal` label to a PR to intentionally remove/weaken a previously-passing contract packet without a `test_ratchet` block.'
  workspace-id:
    description: Shared TDD preview workspace ID.
  spec-id:
    description: PR-scoped TDD Spec Hub ID.
  tdd-collection-id:
    description: PR-scoped TDD contract collection ID.
  agent-context-dir:
    description: Agent context directory path.
  agent-task-path:
    description: Agent task markdown path.
  failures-json-path:
    description: Agent failure JSON path.
  ledger-path:
    description: Path to the local verification ledger JSON (.postman-tdd/ledger.json).
  agent-context-artifact:
    description: Workflow artifact containing agent-task.md, failures.json, and immutable-spec-guard.mjs.
  agent-context-artifact-id:
    description: GitHub Actions artifact ID for the agent context, when uploaded.
  agent-context-artifact-digest:
    description: SHA-256 digest for the uploaded agent context artifact, when available.
  config-commit-sha:
    description: Commit SHA produced by workspace ID config writeback, if any.
  pr-comment-id:
    description: GitHub PR comment ID for the sticky TDD preview comment.
  repair-status:
    description: repaired, blocked, skipped, or failed.
  repair-blocked-reason:
    description: Machine-readable reason when repair-status is blocked.
  repair-attempts:
    description: Number of accepted implementation patch attempts.
  repair-commit-sha:
    description: Commit SHA pushed by the repair worker after a green local collection run.
  repair-summary-path:
    description: Path to the local repair summary JSON.
  validation-error-count:
    description: Number of setup validation errors found by mode=validate.
  validation-warning-count:
    description: Number of setup validation warnings found by mode=validate.
  validation-summary:
    description: Multiline setup validation summary from mode=validate.
runs:
  using: node24
  main: dist/action.mjs
