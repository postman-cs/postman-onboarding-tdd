# Opt-in agent dispatch template: Codex CI fix.
#
# This file is OPT-IN. Copy it into .github/workflows/ in your repo only if you
# want OpenAI Codex to attempt automated contract-failure repair. It is never
# auto-installed and the Postman TDD preview workflow does not reference it.
#
# Required secret (add under repo/org settings):
#   OPENAI_API_KEY   - OpenAI API key with Codex access
#
# Budget: max-turns defaults to a conservative value (customer bears API cost).
# Override via the workflow_dispatch input or the MAX_TURNS env var below.
#
# Recursion guard: skips runs whose head_branch starts with 'postman-tdd-fix-'
# (the D17 repair-branch prefix) so Codex never re-triggers on its own push.
# Bot @codex comment triggers are rejected upstream by OpenAI, so dispatch is
# workflow-driven (not comment-driven).
name: Postman TDD Codex CI Fix

on:
  workflow_run:
    workflows: ['Postman TDD Preview']
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  actions: read

concurrency:
  group: postman-tdd-agent-codex-${{ github.event.workflow_run.pull_requests[0].number }}
  cancel-in-progress: false

jobs:
  codex-fix:
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'pull_request' &&
      !startsWith(github.event.workflow_run.head_branch, 'postman-tdd-fix-') &&
      github.event.workflow_run.actor != 'openai-codex[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0

      - name: Download agent context artifact
        uses: actions/download-artifact@v4
        with:
          name: postman-tdd-agent-context
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Run Codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt: |
            Postman TDD contract failed. Read .postman-tdd/failures.json for the full failure context.
            Fix the implementation so the Postman TDD contract collection passes.
            Do NOT edit the OpenAPI spec or any files listed in immutablePaths.
            Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}
          model: gpt-5.5
          # max-turns budget (customer bears API cost): passed via codex-args.
          codex-args: '--max-turns 12'
