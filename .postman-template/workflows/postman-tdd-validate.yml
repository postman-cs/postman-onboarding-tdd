name: Postman TDD Setup Check

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - api/**
      - scripts/postman-tdd-start.sh
      - scripts/postman-tdd-stop.sh
      - .postman-template/onboarding.yml
      - .github/workflows/postman-tdd-validate.yml

permissions:
  contents: read

concurrency:
  group: postman-tdd-validate-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.head_ref }}

      - id: validate
        uses: postman-cs/postman-onboarding-tdd@v0
        with:
          mode: validate

      # Surface the validation-summary output (which includes harness lint
      # 'To fix:' remediation instructions when the agent harness is opted in)
      # in the GitHub Actions step summary so it is visible in the Actions UI.
      - name: Surface validation summary
        if: always()
        run: |
          echo "${{ steps.validate.outputs.validation-summary }}" >> "$GITHUB_STEP_SUMMARY"